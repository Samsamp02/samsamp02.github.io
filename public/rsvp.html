<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSVP - Marissa & Joel Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
 
  <div class="header" id="site-header">
    <div class="namespace"><a class="ok" href="index.html">Marissa & Joël</a></div>
    <div class="header-row">
      <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-expanded="false">☰</button>
      <div class="header-buttons" id="header-buttons-mobile">
        <a href="index.html">Home</a>
        <a href="rsvp.html" class="active">RSVP</a>
        <a href="menu.html">Menu</a>
        <a href="schedule.html">Schedule</a>
        <a href="faq.html">FAQ</a>
        <a href="countdown.html">Countdown</a>
      </div>
    </div>
  </div>
  <script>
    const header = document.getElementById('site-header');
    const btn = document.getElementById('menu-btn');
    btn.addEventListener('click', () => {
      const isOpen = header.classList.toggle('nav-open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  </script>

  <main class="container">
    <section class="card" style="font-size: 18px;">
      <h2 class="center">RSVP for Marissa & Joel</h2>
      <p class="center" style="margin-top:6px;">We’re excited to celebrate with you!</p>
      <p class="center">Please provide your mobile phone number, which will serve as your RSVP code.</p>
      
      <form id="rsvpForm">
         <div>
          <p id="statusMsg" class="center"></p>
          <label for="phone">Phone number</label>
          <input type="tel"
          id="phone"
          name="phone"
          placeholder="705-123-1234"
          required class="textBox" type="phone" id="phone" name="phone" required>
        </div>


        <div>
          <label for="name">First Name</label>
          <input class="textBox" type="text" id="name" name="name" required>
        </div>

        <div>
          <label for="lastName">Last Name</label>
          <input class="textBox" type="text" id="lastName" name="lastName" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input class="textBox" type="email" id="email" name="email" required>
        </div>
       
        <div>
          <label for="attendance">Will you attend?</label>
          <select class="textBox" id="attendance" name="attendance" required>
            <option value="" disabled selected>Select an option</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
        
        <div id="foodChoices" class="food-choice-wrap">
          <label class="food-choice-label" for="main">Choose a main: <a href="menu.html"> (view menu)</a></label>
          <select class="food-choice" name="main" id="main">
            <option value="" disabled selected>Select an option</option>
            <option value="chicken">Chicken</option>
            <option value="pork">Pork</option>
            <option value="vegetarian">Vegetarian</option>
          </select>
        
          <label class="food-choice-label" for="side">Choose a first course:</label>
          <select class="food-choice" name="side" id="side">
            <option value="" disabled selected>Select an option</option>
            <option value="soup">Mushroom soup</option>
            <option value="salad">Kale caesar salad</option>
          </select>
       

        <label class="food-choice-label" for="dessert">Choose a dessert:</label>
        <select class="food-choice" name="desert" id="desert">
          <option value="" disabled selected>Select an option</option>
          <option value="cheesecake" id="option1">Blueberry cheesecake</option>
          <option value="creme brulee" id="option2">Crème brûlée</option>
        </select>

        <div>
          <label class="food-choice-label" for="comment">Comments/allergies:</label>
          <input class="textBox" type="text" id="comment" name="comment" placeholder="Optional">
        </div>

      </div>

        <div>
          <input type="checkbox" id="aussie" name="aussie" style="display:none;">
          <label for="aussie" id="aussie-label" style="display:none;">I am an Australian resident</label>
          <p class="center">Please review the menu before submitting your RSVP</p>

          <button type="submit" class="btn" onclick="window.scrollTo(0, 0);">Submit RSVP</button>
          
        </div>
        
      </form>
    </section>
  </main>


  <section class="hero">
    <img src="img/IMG_8391.jpg" class="large-img" alt="Photo" style=" margin-bottom: -50px; width: 100%; max-width: 500px; object-fit: cover; border-radius: 14px;box-shadow: var(--shadow-soft);">
      <div>
      <h3 >Can’t wait to celebrate with you 💜</h3>  
      </div>
  </section>

  <footer>
  </footer>

  <script type="module" src="./rsvp.js"></script>
</body>
</html>
