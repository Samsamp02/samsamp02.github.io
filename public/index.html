<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marissa & Joel's Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="header" id="site-header">
    <div class="namespace"><a class="ok" href="index.html">Marissa & Joël</a></div>
    <div class="header-row">
      <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-expanded="false">☰</button>
      <div class="header-buttons" id="header-buttons-mobile">
        <a href="index.html" class="active">Home</a>
        <a href="rsvp.html">RSVP</a>
        <a href="menu.html">Menu</a>
        <a href="schedule.html">Schedule</a>
        <a href="faq.html">FAQ</a>
        <a href="countdown.html">Countdown</a>
      </div>
    </div>
  </div>
  <script type="module" src="./header-script.js"></script>


  <main class="container">
    <!--banner image with text overlapped-->
    <section class="hero">
      <img style="height: clamp(420px, 55vw, 820px);"src="img/header_banner.jpg" alt="banner image">
      <div class="hero-text">
        <h1 style="font-size: 48px;">Marissa & Joel</h1>
        <p style="font-size:24px;">We're getting married! <br> August 15th, 2026</p>
      </div>
    </section>

    <section class="card center">
      <a class="btn" href="rsvp.html">RSVP</a>
    
      <label><h3>
      Please review <a href="menu.html">the menu</a> before submitting your RSVP
      </h3></label>
      <br>
      
      <!--dress code image, contains colour theme overlapped-->
      <div class="palette-container">
        <div class="palette-side">
          <div class="palette-box"><img src="img/colour-blue.jpg" alt="dark blue"></div>
          <div class="palette-box"><img src="img/colour-green.jpg" alt="dark green"></div>
          <div class="palette-box"><img src="img/colour-purple.jpg" alt="purple"></div>
          <div class="palette-box"><img src="img/colour-grey.jpg" alt="grey"></div>
          <div class="palette-box"><img src="img/colour-black.jpg" alt="black"></div>
        </div>
        <div class="palette-text">
          <h3>Dress code:</h3>
          <p>Formal attire in dark, cool-toned colours (e.g., navy, emerald, charcoal, deep plum).</p>
        </div>
      </div>
      
      
      <!--img gallery, pictures of bride & groom-->
      <div class="gallery">
        <div>
          <img src="img/old_banner.jpg" alt="Photo 2">
          <br>
          <a href="schedule.html"><h2>View schedule</h2></a>
        </div>
        <div>
          <img src="img/IMG_8125.jpg" alt="Photo 3">
          <br>
          <a href="faq.html"><h2>View FAQ</h2></a>
        </div>
        <div>
          <img src="img/IMG_8446.jpg" alt="Photo 5">
          <br>
          <a href="countdown.html"><h2>View countdown</h2></a>
        </div>
        <div>
          <!--beige background text overlap-->
          <section class="hero">
            <img src="img/IMG_8229.jpg" alt="Photo 4" style="  width: 100%; aspect-ratio: 1 / 1;object-fit: cover;border-radius: 14px;box-shadow: var(--shadow-soft);">
              <div>
              <h3>Can’t wait to celebrate with you 💜</h3>  
              </div>
          </section>
        </div>
      </div>
    </section>
  </main>
  <footer>
  </footer>
</body>
</html>
